plugins {
    id 'com.android.application'
}

android {
    namespace "de.viatorus.neo2externalkeyboard"  // match the package in AndroidManifest.xm1l
    compileSdkVersion 34

    defaultConfig {
        applicationId "de.viatorus.neo2externalkeyboard"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.1.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
}
